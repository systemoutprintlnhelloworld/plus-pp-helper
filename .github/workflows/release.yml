name: Release Extension

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Stage extension files
        run: |
          rm -rf dist
          mkdir -p dist/plus-pp-helper
          cp manifest.json background.js dist/plus-pp-helper/
          cp -R content shared sidepanel icons dist/plus-pp-helper/

      - name: Build ZIP
        run: |
          cd dist/plus-pp-helper
          zip -r ../plus-pp-helper.zip .

      - name: Prepare CRX key
        env:
          CRX_PRIVATE_KEY_B64: ${{ secrets.CRX_PRIVATE_KEY_B64 }}
        run: |
          if [ -n "$CRX_PRIVATE_KEY_B64" ]; then
            echo "$CRX_PRIVATE_KEY_B64" | base64 -d > dist/plus-pp-helper.pem
          fi

      - name: Build CRX
        run: |
          CHROME_BIN="$(command -v chrome || command -v google-chrome || command -v chromium || command -v chromium-browser)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome executable not found"
            exit 1
          fi
          if [ -f dist/plus-pp-helper.pem ]; then
            "$CHROME_BIN" --no-sandbox --pack-extension="$PWD/dist/plus-pp-helper" --pack-extension-key="$PWD/dist/plus-pp-helper.pem"
          else
            "$CHROME_BIN" --no-sandbox --pack-extension="$PWD/dist/plus-pp-helper"
          fi
          rm -f dist/plus-pp-helper.pem
          test -f dist/plus-pp-helper.zip
          test -f dist/plus-pp-helper.crx

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plus-pp-helper-extension
          path: |
            dist/plus-pp-helper.zip
            dist/plus-pp-helper.crx

      - name: Resolve release metadata
        id: release-meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag_name=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "release_name=plus-pp-helper $GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=auto-$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
            echo "release_name=plus-pp-helper auto release #$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release-meta.outputs.release_name }}
          prerelease: ${{ steps.release-meta.outputs.prerelease }}
          make_latest: true
          body: |
            Automated extension release for commit ${{ github.sha }}.

            Artifacts:
            - plus-pp-helper.zip
            - plus-pp-helper.crx
          files: |
            dist/plus-pp-helper.zip
            dist/plus-pp-helper.crx
